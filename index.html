<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Slab Segmentation - HI-TECH HOUSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="header-logo" style="background: white; padding: 4px; border-radius: 8px;">
        <img id="headerLogo" src="logo.png" alt="Logo" style="width: 32px; height: 32px;">
      </div>
      <h1>Slab Segmentation</h1>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button id="langToggle" class="btn"
        style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; font-size: 13px;">🌐
        العربية</button>
      <button class="btn"
        style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 6px; border-radius: 50%;"><i
          class="fas fa-moon"></i></button>
      <button class="btn"
        style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; font-size: 13px;">Reset</button>
    </div>
  </header>

  <div class="wrap">
    <div class="controls">
      <!-- Section 1: Box Types -->
      <div class="control-card">
        <div
          style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-light); padding-bottom: 12px; margin-bottom: 16px;">
          <label style="margin: 0; border: none; padding: 0;">📦 Box Types</label>
          <div style="display: flex; gap: 8px;">
            <button id="addBoxType" class="btn"
              style="padding: 8px 16px; font-size: 12px; background: var(--primary);">+ Add Box Type</button>
          </div>
        </div>
        <div style="overflow-x: auto;">
          <table id="boxTypesTable" style="width: 100%; border-collapse: collapse; font-size: 13px;">
            <thead>
              <tr style="background: var(--bg-light); border-bottom: 2px solid var(--border);">
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 35%;">
                  BOX NAME</th>
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 25%;">
                  WIDTH (mm)</th>
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 25%;">
                  HEIGHT (mm)</th>
                <th
                  style="padding: 10px 12px; text-align: center; font-weight: 700; font-size: 11px; color: var(--text-muted); width: 15%;">
                </th>
              </tr>
            </thead>
            <tbody id="boxTypesBody">
              <!-- Box type rows injected by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Section 2: Spacing Settings -->
      <div class="control-card">
        <label>⚙️ Spacing Settings</label>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px;">
          <div>
            <label id="outerMarginLabel" style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">Outer
              margin (mm)</label>
            <input id="outerMargin" type="number" value="0" min="0" placeholder="0" style="padding: 10px;">
          </div>
          <div>
            <label id="pieceSpacingLabel" style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">Spacing
              between pieces (mm)</label>
            <input id="pieceSpacing" type="number" value="0" min="0" placeholder="0" style="padding: 10px;">
          </div>
        </div>
      </div>

      <!-- Section 3: Piece Types -->
      <div class="control-card">
        <div
          style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-light); padding-bottom: 12px; margin-bottom: 16px;">
          <label style="margin: 0; border: none; padding: 0;">🧩 Piece Types</label>
          <div style="display: flex; gap: 8px;">
            <button id="addType" class="btn" style="padding: 8px 16px; font-size: 12px; background: var(--primary);">+
              Add Piece</button>
            <button id="clearTypes" class="btn ghost"
              style="padding: 8px 16px; font-size: 12px; border: 1px solid var(--border);">Clear All</button>
          </div>
        </div>
        <div style="overflow-x: auto;">
          <table id="pieceTypesTable" style="width: 100%; border-collapse: collapse; font-size: 13px;">
            <thead>
              <tr style="background: var(--bg-light); border-bottom: 2px solid var(--border);">
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 25%;">
                  BOX TYPE</th>
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 22%;">
                  PIECE LENGTH (mm)</th>
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 22%;">
                  PIECE WIDTH (mm)</th>
                <th
                  style="padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; width: 18%;">
                  QUANTITY</th>
                <th
                  style="padding: 10px 12px; text-align: center; font-weight: 700; font-size: 11px; color: var(--text-muted); width: 13%;">
                </th>
              </tr>
            </thead>
            <tbody id="pieceTypesBody">
              <!-- Piece rows injected by JS -->
            </tbody>
          </table>
        </div>
        <div id="types-grid" style="display: none;"></div>
        <div id="types" style="display: none;"></div>
      </div>

      <!-- Section 4: Intelligence Settings -->
      <div class="control-card">
        <label>🧠 Intelligence Settings & Options</label>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 32px;">
          <div>
            <span
              style="font-size: 11px; color: var(--text-muted); font-weight: 800; display: block; margin-bottom: 12px; letter-spacing: 0.5px;">GENERAL
              OPTIONS</span>
            <label class="checkbox-label" style="margin: 8px 0;"><input id="allowRotate" type="checkbox"> <span>Allow
                90° Rotation</span></label>
            <label class="checkbox-label" style="margin: 8px 0;"><input id="showWaste" type="checkbox" checked>
              <span>Show Empty Areas</span></label>
            <label class="checkbox-label" style="margin: 8px 0;"><input id="doLocal" type="checkbox" checked>
              <span>Local Optimization</span></label>
          </div>
          <div>
            <span
              style="font-size: 11px; color: var(--text-muted); font-weight: 800; display: block; margin-bottom: 12px; letter-spacing: 0.5px;">EVALUATION
              HEURISTICS</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <label class="checkbox-label" style="margin: 4px 0;"><input class="heur" type="checkbox" value="bssf"
                  checked> <span>BSSF</span></label>
              <label class="checkbox-label" style="margin: 4px 0;"><input class="heur" type="checkbox" value="baf"
                  checked> <span>BAF</span></label>
              <label class="checkbox-label" style="margin: 4px 0;"><input class="heur" type="checkbox" value="blsf"
                  checked> <span>BLSF</span></label>
              <label class="checkbox-label" style="margin: 4px 0;"><input class="heur" type="checkbox" value="cpr"
                  checked> <span>CPR</span></label>
            </div>
          </div>
          <div>
            <span
              style="font-size: 11px; color: var(--text-muted); font-weight: 800; display: block; margin-bottom: 12px; letter-spacing: 0.5px;">OPTIMIZATION
              ALGORITHM</span>
            <select id="optAlgo" style="padding: 12px; margin-top: 4px;">
              <option value="greedy">Greedy (Fast)</option>
              <option value="local">Local Search</option>
              <option value="sa">Simulated Annealing</option>
              <option value="ga" selected>Genetic Algorithm (Best)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Section 5: Reports & Export (now rendered dynamically per-algorithm) -->

      <div id="msg"></div>
    </div>

  </div>
  </div>

  <!-- Sticky Execute Bar -->
  <div class="sticky-bar">
    <button id="packAll" class="btn">
      🚀 EXECUTE PACKING
    </button>
  </div>
  <div style="max-width: 1000px; margin: 0 auto; padding: 0 20px;">
    <div id="algoComparisonPanel" style="margin-top: 24px;"></div>
    <div id="globalResults" style="margin-top: 24px;"></div>
    <div id="algoResultsArea"></div>
    <div class="canvases" id="canvases"></div>
    <div id="algoExportBar"></div>
    <div id="wasteReport" style="margin-top: 24px;"></div>
  </div>

  <!-- Loading Overlay -->
  <div id="loaderOverlay">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loaderText">Processing...</div>
  </div>
  </div>
  </div>

  <div id="pieceSelectionModal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); z-index: 2000; justify-content: center; align-items: center;">
    <div
      style="background: white; padding: 40px; border-radius: 32px; max-width: 600px; max-height: 90vh; overflow-y: auto; width: 95%; position: relative;">
      <button id="closeModalBtn"
        style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light);">✕</button>
      <h2 id="pieceSelectTitle"
        style="margin-top: 0; color: var(--text-dark); font-size: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        📦 Export Selection</h2>

      <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px;">
        <div
          style="padding: 20px; background: rgba(139, 92, 246, 0.05); border: 2px solid rgba(139, 92, 246, 0.1); border-radius: 20px; cursor: pointer; transition: all 0.3s;"
          id="optAllPieces" class="export-opt">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; margin: 0;">
            <input type="radio" name="exportMode" value="all" checked
              style="width: 20px; height: 20px; accent-color: var(--primary);">
            <div style="flex: 1;">
              <strong id="allPiecesLabel" style="display: block; font-size: 16px;">All Packed Pieces</strong>
              <span style="font-size: 13px; color: var(--text-light);">Download details for every piece in the
                packing result</span>
            </div>
          </label>
        </div>

        <div
          style="padding: 20px; background: white; border: 2px solid #f1f5f9; border-radius: 20px; cursor: pointer; transition: all 0.3s;"
          id="optSinglePiece" class="export-opt">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; margin: 0;">
            <input type="radio" name="exportMode" value="single"
              style="width: 20px; height: 20px; accent-color: var(--primary);">
            <div style="flex: 1;">
              <strong style="display: block; font-size: 16px;" id="singlePieceLabel">Single Piece</strong>
              <span style="font-size: 13px; color: var(--text-light);">Select one specific piece from the
                list</span>
            </div>
          </label>
          <div id="singleSelectContainer" style="display: none; margin-top: 16px;">
            <select id="singlePieceDropdown" class="form-select"
              style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);"></select>
          </div>
        </div>

        <div
          style="padding: 20px; background: white; border: 2px solid #f1f5f9; border-radius: 20px; cursor: pointer; transition: all 0.3s;"
          id="optPieceType" class="export-opt">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; margin: 0;">
            <input type="radio" name="exportMode" value="type"
              style="width: 20px; height: 20px; accent-color: var(--primary);">
            <div style="flex: 1;">
              <strong style="display: block; font-size: 16px;" id="pieceTypeLabel">By Piece Type</strong>
              <span style="font-size: 13px; color: var(--text-light);">Select one or more categories (e.g.,
                STN-0, STN-1)</span>
            </div>
          </label>
          <div id="typeChecklistContainer" style="display: none; margin-top: 16px;">
            <div id="typesChecklist"
              style="max-height: 150px; overflow-y: auto; border: 1px solid #f1f5f9; border-radius: 16px; padding: 12px; background: #f8fafc;">
              <!-- Type checkboxes will be populated here -->
            </div>
          </div>
        </div>

        <div
          style="padding: 20px; background: white; border: 2px solid #f1f5f9; border-radius: 20px; cursor: pointer; transition: all 0.3s;"
          id="optMultiplePieces" class="export-opt">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 12px; width: 100%; margin: 0;">
            <input type="radio" name="exportMode" value="checklist"
              style="width: 20px; height: 20px; accent-color: var(--primary);">
            <div style="flex: 1;">
              <strong style="display: block; font-size: 16px;" id="multiplePiecesLabel">Multiple Pieces
                (Checklist)</strong>
              <span style="font-size: 13px; color: var(--text-light);">Choose specific pieces manually from the
                list below</span>
            </div>
          </label>
          <div id="checklistContainer" style="display: none; margin-top: 16px;">
            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
              <input type="text" id="pieceSearch" placeholder="Search pieces..."
                style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px;">
              <button id="toggleAllPieces" class="btn ghost" style="padding: 8px 12px; font-size: 12px;">Select
                All</button>
            </div>
            <div id="piecesChecklist"
              style="max-height: 250px; overflow-y: auto; border: 1px solid #f1f5f9; border-radius: 16px; padding: 12px; background: #f8fafc;">
              <!-- Piece checkboxes will be populated here -->
            </div>
          </div>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
        <button id="exportSelectedExcel" class="btn"
          style="padding: 16px; background: linear-gradient(135deg, #10b981, #059669);">📊 Download
          Excel</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <button id="genReportEN" class="btn secondary"
            style="padding: 12px; background: linear-gradient(135deg, #3b82f6, #2563eb);">📑 Report
            (EN)</button>
          <button id="genReportAR" class="btn secondary"
            style="padding: 12px; background: linear-gradient(135deg, #8b5cf6, #7c3aed);">📑 Report
            (AR)</button>
        </div>
        <button id="cancelPieceSelection" class="btn ghost">Cancel</button>
      </div>
    </div>
  </div>
  <script src="src.js"></script>
</body>


</html>
